name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4
      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: echo "repos=$(jq -c . < ${{ env.CONFIGURATION }})" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: [Set-repos]
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      # Android 16 Build Environment
      LLVM: 1
      LLVM_IAS: 1
      CLANG_TRIPLE: aarch64-linux-gnu-

    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools clang lld llvm

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: git clone --recursive --branch ${{ env.kernelBranch }} ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1

      - name: "🛠️ Patch Headers for Android 16"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          # Fix double void syntax in nmi.h
          if [ -f "include/linux/nmi.h" ]; then
            sed -i 's/static inline void void/static inline void/g' include/linux/nmi.h
          fi
          # Fix missing ZONE_DMA in mmzone.h
          if [ -f "include/linux/mmzone.h" ]; then
            sed -i '/#define _LINUX_MMZONE_H/a #define ZONE_DMA 0' include/linux/mmzone.h
          fi

      - name: "🔥 Inject Overclock & Thermal Bypasses"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          DVFS_FILE=$(find arch/arm64/boot/dts -name "*dvfs*" -o -name "*exynos*" -o -name "*thermal*" | head -n 1)
          if [ -f "$DVFS_FILE" ]; then
            sed -i 's/2301000/2405000/g' "$DVFS_FILE"
            sed -i 's/1150000/1225000/g' "$DVFS_FILE"
          fi

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        run: |
          # Set Android 16 compatible flags in KCFLAGS
          echo "KCFLAGS=-w -Wno-error -fno-integrated-as" >> $GITHUB_ENV
          # (Your existing arg generation logic here)
          echo "args=-j$(nproc --all)" >> $GITHUB_OUTPUT

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: make ARCH=arm64 ${{ env.DEFCONFIG_NAME }}

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          make ${{ steps.generate-args.outputs.args }} ARCH=arm64 KCFLAGS="${{ env.KCFLAGS }}"
